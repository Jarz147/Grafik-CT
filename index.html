<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSY 8 - CT MONITORING SYSTEM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --accent-color: #00d2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px;
            margin: 0;
        }

        h1 { 
            text-align: center; 
            color: white; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,210,255,0.3);
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            max-width: 1400px;
            margin: 0 auto;
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 15px; 
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .title { 
            color: var(--accent-color); 
            font-weight: bold; 
            font-size: 1.1rem;
            border-bottom: 1px solid #333; 
            padding-bottom: 10px; 
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot { 
            color: var(--neon-red); 
            font-size: 1.4rem;
            transition: color 0.3s;
        }

        .val { 
            font-size: 4rem; 
            color: var(--neon-green); 
            text-align: center; 
            font-family: 'Courier New', monospace; 
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            margin: 10px 0;
        }

        .tskk { 
            text-align: center; 
            color: #8b949e; 
            margin-bottom: 15px;
            font-size: 0.95rem;
            background: rgba(255,255,255,0.05);
            padding: 5px;
            border-radius: 6px;
        }

        canvas { width: 100% !important; max-height: 160px; }
    </style>
</head>
<body>

    <h1>CT MONITORING ASSY 8</h1>

    <div class="grid" id="app">
        <div class="card">
            <div class="title">UNIT R1 <span id="s-r1" class="status-dot">●</span></div>
            <div class="val" id="v-r1">0.00s</div>
            <div class="tskk" id="t-r1">TSKK: 0.00s</div>
            <canvas id="c-r1"></canvas>
        </div>

        <div class="card">
            <div class="title">UNIT R2 <span id="s-r2" class="status-dot">●</span></div>
            <div class="val" id="v-r2">0.00s</div>
            <div class="tskk" id="t-r2">TSKK: 0.00s</div>
            <canvas id="c-r2"></canvas>
        </div>

        <div class="card">
            <div class="title">UNIT R3 <span id="s-r3" class="status-dot">●</span></div>
            <div class="val" id="v-r3">0.00s</div>
            <div class="tskk" id="t-r3">TSKK: 0.00s</div>
            <canvas id="c-r3"></canvas>
        </div>

        <div class="card">
            <div class="title">UNIT LEAKTEST <span id="s-lt" class="status-dot">●</span></div>
            <div class="val" id="v-lt">0.00s</div>
            <div class="tskk" id="t-lt">TSKK: 0.00s</div>
            <canvas id="c-lt"></canvas>
        </div>
    </div>

    <script>
        // --- KONFIGURASI MQTT CLOUD ---
        const BROKER_URL = 'wss://x914fb68.ala.eu-central-1.emqxsl.com:8084/mqtt';
        
        const options = {
            clientId: 'web_monitor_' + Math.random().toString(16).substr(2, 8),
            username: 'Jarz147',
            password: 'Sankei2022!',
            clean: true,
            connectTimeout: 5000,
            keepalive: 60
        };

        const units = {
            'ct-r1-a8': { v: 'v-r1', t: 't-r1', s: 's-r1', cid: 'c-r1', chart: null },
            'ct-r2-a8': { v: 'v-r2', t: 't-r2', s: 's-r2', cid: 'c-r2', chart: null },
            'ct-r3-a8': { v: 'v-r3', t: 't-r3', s: 's-r3', cid: 'c-r3', chart: null },
            'ct-lt-a8': { v: 'v-lt', t: 't-lt', s: 's-lt', cid: 'c-lt', chart: null }
        };

        // --- INISIALISASI CHART ---
        function createChart(id) {
            const ctx = document.getElementById(id).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(20).fill(''),
                    datasets: [{
                        data: Array(20).fill(null),
                        borderColor: '#00d2ff',
                        backgroundColor: 'rgba(0, 210, 255, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { 
                            beginAtZero: true, 
                            grid: { color: '#222' }, 
                            ticks: { color: '#555', font: { size: 10 } } 
                        }
                    }
                }
            });
        }

        // Jalankan Chart
        Object.keys(units).forEach(key => {
            units[key].chart = createChart(units[key].cid);
        });

        // --- KONEKSI MQTT ---
        const client = mqtt.connect(BROKER_URL, options);

        client.on('connect', () => {
            console.log("✅ Terhubung ke EMQX Cloud via WSS");
            Object.keys(units).forEach(topicId => {
                client.subscribe(topicId + '/#');
                // Ubah indikator jadi hijau
                document.getElementById(units[topicId].s).style.color = '#39ff14';
            });
        });

        function parsePayloadValue(rawPayload, typeHint) {
            const raw = rawPayload.toString().trim();
            const direct = parseFloat(raw);
            if (!Number.isNaN(direct)) return direct;

            try {
                const parsed = JSON.parse(raw);
                if (typeof parsed === 'number' && Number.isFinite(parsed)) return parsed;
                if (parsed && typeof parsed === 'object') {
                    const keysToTry = [];
                    if (typeHint) keysToTry.push(typeHint);
                    keysToTry.push('ct', 'ctl', 'ctr', 'cycle_time', 'value', 'tskk');

                    for (const key of keysToTry) {
                        if (parsed[key] !== undefined) {
                            const candidate = parseFloat(parsed[key]);
                            if (!Number.isNaN(candidate)) return candidate;
                        }
                    }
                }
            } catch (e) {
                // Abaikan bila payload bukan JSON valid.
            }

            return NaN;
        }

        client.on('message', (topic, payload) => {
            const parts = topic.split('/');
            const deviceId = parts[0];
            // Jika topik hanya deviceId, anggap sebagai cycle time.
            const type = parts[1] ? parts[1].toLowerCase() : 'ct';
            const value = parsePayloadValue(payload, type);

            if (!units[deviceId] || Number.isNaN(value)) return;

            // Update Cycle Time (ct, ctl, ctr)
            if (['ct', 'ctl', 'ctr'].includes(type)) {
                document.getElementById(units[deviceId].v).innerText = value.toFixed(2) + 's';
                
                const chart = units[deviceId].chart;
                chart.data.datasets[0].data.push(value);
                chart.data.datasets[0].data.shift();
                chart.update();
            } 
            // Update TSKK
            else if (type === 'tskk') {
                document.getElementById(units[deviceId].t).innerText = 'TSKK: ' + value.toFixed(2) + 's';
            }
        });

        client.on('error', (err) => {
            console.error("❌ MQTT Error: ", err);
        });

        client.on('offline', () => {
            console.warn("⚠️ Client Offline. Mencoba menyambung kembali...");
            Object.keys(units).forEach(id => {
                document.getElementById(units[id].s).style.color = '#ff3131';
            });
        });
    </script>
</body>
</html>
