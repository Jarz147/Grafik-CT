<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSY 8 - CT MONITORING SYSTEM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --accent-color: #00d2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --neon-orange: #ffaa00;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px;
            margin: 0;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto 30px auto;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        h1 { 
            margin: 0;
            color: white; 
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
        }

        /* Broker Indicator Style */
        .broker-status {
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #connection-dot {
            height: 10px;
            width: 10px;
            background-color: var(--neon-red);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--neon-red);
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            max-width: 1400px;
            margin: 0 auto;
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 15px; 
            padding: 20px;
        }

        .title { 
            color: var(--accent-color); 
            font-weight: bold; 
            font-size: 1.1rem;
            border-bottom: 1px solid #333; 
            padding-bottom: 10px; 
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .val { 
            font-size: 4rem; 
            color: var(--neon-green); 
            text-align: center; 
            font-family: 'Courier New', monospace; 
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            margin: 10px 0;
        }

        .tskk { 
            text-align: center; 
            color: #8b949e; 
            margin-bottom: 15px;
            font-size: 0.95rem;
            background: rgba(255,255,255,0.05);
            padding: 5px;
            border-radius: 6px;
        }

        canvas { width: 100% !important; max-height: 160px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>CT MONITORING ASSY 8</h1>
        <div class="broker-status">
            <span id="connection-dot"></span>
            <span id="connection-text">BROKER: DISCONNECTED</span>
        </div>
    </div>

    <div class="grid" id="app">
        <div class="card">
            <div class="title">UNIT R1</div>
            <div class="val" id="v-r1">0.00s</div>
            <div class="tskk" id="t-r1">TSKK: 0.00s</div>
            <canvas id="c-r1"></canvas>
        </div>

        <div class="card">
            <div class="title">UNIT R2</div>
            <div class="val" id="v-r2">0.00s</div>
            <div class="tskk" id="t-r2">TSKK: 0.00s</div>
            <canvas id="c-r2"></canvas>
        </div>

        <div class="card">
            <div class="title">UNIT R3</div>
            <div class="val" id="v-r3">0.00s</div>
            <div class="tskk" id="t-r3">TSKK: 0.00s</div>
            <canvas id="c-r3"></canvas>
        </div>

        <div class="card">
            <div class="title">UNIT LEAKTEST</div>
            <div class="val" id="v-lt">0.00s</div>
            <div class="tskk" id="t-lt">TSKK: 0.00s</div>
            <canvas id="c-lt"></canvas>
        </div>
    </div>

    <script>
        const BROKER_URL = 'wss://x914fb68.ala.eu-central-1.emqxsl.com:8084/mqtt';
        
        const options = {
            clientId: 'web_monitor_' + Math.random().toString(16).substr(2, 8),
            username: 'Jarz147',
            password: 'Sankei2022!',
            clean: true,
            connectTimeout: 5000,
            keepalive: 60
        };

        const units = {
            'ct-r1-a8': { v: 'v-r1', t: 't-r1', cid: 'c-r1', chart: null },
            'ct-r2-a8': { v: 'v-r2', t: 't-r2', cid: 'c-r2', chart: null },
            'ct-r3-a8': { v: 'v-r3', t: 't-r3', cid: 'c-r3', chart: null },
            'ct-lt-a8': { v: 'v-lt', t: 't-lt', cid: 'c-lt', chart: null }
        };

        const statusDot = document.getElementById('connection-dot');
        const statusText = document.getElementById('connection-text');

        function updateConnectionStatus(status) {
            if(status === 'connected') {
                statusDot.style.backgroundColor = 'var(--neon-green)';
                statusDot.style.boxShadow = '0 0 8px var(--neon-green)';
                statusText.innerText = 'BROKER: CONNECTED';
                statusText.style.color = 'var(--neon-green)';
            } else if (status === 'connecting') {
                statusDot.style.backgroundColor = 'var(--neon-orange)';
                statusDot.style.boxShadow = '0 0 8px var(--neon-orange)';
                statusText.innerText = 'BROKER: CONNECTING...';
                statusText.style.color = 'var(--neon-orange)';
            } else {
                statusDot.style.backgroundColor = 'var(--neon-red)';
                statusDot.style.boxShadow = '0 0 8px var(--neon-red)';
                statusText.innerText = 'BROKER: DISCONNECTED';
                statusText.style.color = 'var(--neon-red)';
            }
        }

        function createChart(id) {
            return new Chart(document.getElementById(id), {
                type: 'line',
                data: {
                    labels: Array(20).fill(''),
                    datasets: [{
                        data: Array(20).fill(null),
                        borderColor: '#00d2ff',
                        backgroundColor: 'rgba(0, 210, 255, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { beginAtZero: true, grid: { color: '#222' }, ticks: { color: '#555' } }
                    }
                }
            });
        }

        Object.keys(units).forEach(key => units[key].chart = createChart(units[key].cid));

        updateConnectionStatus('connecting');
        const client = mqtt.connect(BROKER_URL, options);

        client.on('connect', () => {
            updateConnectionStatus('connected');
            Object.keys(units).forEach(topicId => client.subscribe(topicId + '/#'));
        });

        client.on('message', (topic, payload) => {
            const parts = topic.split('/');
            const deviceId = parts[0];
            const type = parts[1] ? parts[1].toLowerCase() : '';
            const value = parseFloat(payload.toString());

            if (!units[deviceId] || isNaN(value)) return;

            if (['ct', 'ctl', 'ctr'].includes(type)) {
                document.getElementById(units[deviceId].v).innerText = value.toFixed(2) + 's';
                const chart = units[deviceId].chart;
                chart.data.datasets[0].data.push(value);
                chart.data.datasets[0].data.shift();
                chart.update();
            } else if (type === 'tskk') {
                document.getElementById(units[deviceId].t).innerText = 'TSKK: ' + value.toFixed(2) + 's';
            }
        });

        client.on('offline', () => updateConnectionStatus('disconnected'));
        client.on('reconnect', () => updateConnectionStatus('connecting'));
        client.on('error', (err) => {
            console.error(err);
            updateConnectionStatus('disconnected');
        });
    </script>
</body>
</html>
