<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSY 8 - CT MONITORING SYSTEM</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --accent-color: #00d2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --neon-orange: #ffaa00;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif; 
            padding: 20px;
            margin: 0;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto 30px auto;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .broker-status {
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #connection-dot {
            height: 10px;
            width: 10px;
            background-color: var(--neon-red);
            border-radius: 50%;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            max-width: 1400px;
            margin: 0 auto;
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 15px; 
            padding: 20px;
        }

        .val { 
            font-size: 4rem; 
            color: var(--neon-green); 
            text-align: center; 
            font-family: monospace; 
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
        }

        canvas { width: 100% !important; max-height: 160px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>CT MONITORING ASSY 8</h1>
        <div class="broker-status">
            <span id="connection-dot"></span>
            <span id="connection-text">BROKER: DISCONNECTED</span>
        </div>
    </div>

    <div class="grid">
        <div class="card"><div>UNIT R1</div><div class="val" id="v-r1">0.00s</div><canvas id="c-r1"></canvas></div>
        <div class="card"><div>UNIT R2</div><div class="val" id="v-r2">0.00s</div><canvas id="c-r2"></canvas></div>
        <div class="card"><div>UNIT R3</div><div class="val" id="v-r3">0.00s</div><canvas id="c-r3"></canvas></div>
        <div class="card"><div>UNIT LEAKTEST</div><div class="val" id="v-lt">0.00s</div><canvas id="c-lt"></canvas></div>
    </div>

    <script>
        // Gunakan WSS dan Kredensial Pajar
        const BROKER_URL = 'wss://x914fb68.ala.eu-central-1.emqxsl.com:8084/mqtt';
        const options = {
            clientId: 'pajar_dash_' + Math.random().toString(16).substr(2, 5),
            username: 'Jarz147',
            password: 'Sankei2022!',
            clean: true
        };

        const units = {
            'ct-r1-a8': { v: 'v-r1', cid: 'c-r1', chart: null },
            'ct-r2-a8': { v: 'v-r2', cid: 'c-r2', chart: null },
            'ct-r3-a8': { v: 'v-r3', cid: 'c-r3', chart: null },
            'ct-lt-a8': { v: 'v-lt', cid: 'c-lt', chart: null }
        };

        // Fungsi membuat chart dengan proteksi jika library belum siap
        function createChart(id) {
            if (typeof Chart === 'undefined') {
                console.error("Chart.js belum dimuat!");
                return null;
            }
            const ctx = document.getElementById(id).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(20).fill(''),
                    datasets: [{
                        data: Array(20).fill(null),
                        borderColor: '#00d2ff',
                        backgroundColor: 'rgba(0, 210, 255, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: '#222' } } }
                }
            });
        }

        // Jalankan inisialisasi setelah DOM siap
        window.onload = () => {
            Object.keys(units).forEach(key => {
                units[key].chart = createChart(units[key].cid);
            });

            const client = mqtt.connect(BROKER_URL, options);
            const statusDot = document.getElementById('connection-dot');
            const statusText = document.getElementById('connection-text');

            client.on('connect', () => {
                statusDot.style.backgroundColor = 'var(--neon-green)';
                statusText.innerText = 'BROKER: CONNECTED';
                Object.keys(units).forEach(id => client.subscribe(id + '/#'));
            });

            client.on('message', (topic, payload) => {
                const deviceId = topic.split('/')[0];
                const value = parseFloat(payload.toString());
                if (units[deviceId] && !isNaN(value)) {
                    document.getElementById(units[deviceId].v).innerText = value.toFixed(2) + 's';
                    if (units[deviceId].chart) {
                        units[deviceId].chart.data.datasets[0].data.push(value);
                        units[deviceId].chart.data.datasets[0].data.shift();
                        units[deviceId].chart.update();
                    }
                }
            });

            client.on('offline', () => {
                statusDot.style.backgroundColor = 'var(--neon-red)';
                statusText.innerText = 'BROKER: DISCONNECTED';
            });
        };
    </script>
</body>
</html>
